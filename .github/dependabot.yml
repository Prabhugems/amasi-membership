version: 2
updates:
  # npm packages — weekly batched PRs.
  # Group minor/patch into one PR per ecosystem to avoid PR storms; majors
  # come as individual PRs so they can be reviewed/tested separately.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      production-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Next.js majors require a deliberate migration (codemods + CLAUDE.md
      # rule about local builds). Take majors via a manual PR.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # GitHub Actions versions — monthly is enough.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
